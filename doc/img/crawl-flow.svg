<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 860" font-family="'Hiragino Kaku Gothic ProN','Yu Gothic UI','Noto Sans CJK JP',sans-serif">
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L8,4.5 L0,9 z" fill="#5c6470"/>
    </marker>
    <marker id="ahg" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L8,4.5 L0,9 z" fill="#2e7d32"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="940" height="860" fill="#ffffff"/>

  <!-- fetch_order_list -->
  <rect x="290" y="16" width="360" height="50" rx="10" fill="#fdf3e7" stroke="#e47911" stroke-width="1.5"/>
  <text x="470" y="37" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#1a1d21">crawler.fetch_order_list()</text>
  <text x="470" y="55" text-anchor="middle" font-size="11" fill="#5c6470">シグナルハンドラ設定（Ctrl+C でグレースフル中断）</text>
  <path d="M470,66 L470,88" stroke="#5c6470" stroke-width="1.6" fill="none" marker-end="url(#ah)"/>

  <!-- year list -->
  <rect x="240" y="88" width="460" height="50" rx="8" fill="#ffffff" stroke="#5c6470" stroke-width="1.5"/>
  <text x="470" y="108" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#1a1d21">_fetch_year_list()</text>
  <text x="470" y="126" text-anchor="middle" font-size="11" fill="#5c6470">注文履歴ページの年ドロップダウンから年リストを取得 → metadata に保存</text>
  <path d="M470,138 L470,160" stroke="#5c6470" stroke-width="1.6" fill="none" marker-end="url(#ah)"/>

  <!-- order count -->
  <rect x="240" y="160" width="460" height="64" rx="8" fill="#ffffff" stroke="#5c6470" stroke-width="1.5"/>
  <text x="470" y="180" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#1a1d21">_fetch_order_count() — 年ごとの注文件数</text>
  <text x="470" y="198" text-anchor="middle" font-size="11" fill="#5c6470">キャッシュ最終更新年以降の年のみ再取得（order.parse_order_count）</text>
  <text x="470" y="214" text-anchor="middle" font-size="11" fill="#5c6470">それ以前の年は year_status のキャッシュ値を使用</text>
  <path d="M470,224 L470,248" stroke="#5c6470" stroke-width="1.6" fill="none" marker-end="url(#ah)"/>

  <!-- 年ループ枠 -->
  <rect x="30" y="248" width="880" height="560" rx="10" fill="#fbfbfc" stroke="#1a5fa8" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="46" y="274" font-size="13" font-weight="bold" fill="#1a5fa8">年ループ — 処理対象: 今年 / キャッシュ最終更新年 / 未チェック（checked=0）の年 / -y 指定年</text>
  <text x="46" y="292" font-size="11" fill="#5c6470">対象外の年はスキップし、キャッシュ済み件数分プログレスバーだけ進める</text>

  <!-- ページループ枠 -->
  <rect x="50" y="308" width="840" height="482" rx="10" fill="#ffffff" stroke="#2e7d32" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="66" y="334" font-size="13" font-weight="bold" fill="#2e7d32">ページループ — order_list.fetch_by_year() → fetch_by_year_page()</text>
  <text x="66" y="352" font-size="11" fill="#5c6470">page_status が処理済みのページはスキップ（プログレスのみ更新）。処理完了ページは set_page_checked で記録</text>

  <!-- 注文カード解析 -->
  <rect x="70" y="368" width="850" height="0" fill="none"/>
  <rect x="70" y="368" width="800" height="78" rx="8" fill="#ffffff" stroke="#5c6470" stroke-width="1.5"/>
  <text x="470" y="390" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#1a1d21">① 注文カードの解析（1 ページ = 最大 10 件）</text>
  <text x="470" y="410" text-anchor="middle" font-size="11.5" fill="#1a1d21">キャンセル済みの注文 → スキップ（プログレスは更新）</text>
  <text x="470" y="428" text-anchor="middle" font-size="11.5" fill="#1a1d21">日付・注文番号・詳細リンクを抽出。リンクがない場合は注文番号から URL を構築</text>
  <path d="M470,446 L470,468" stroke="#5c6470" stroke-width="1.6" fill="none" marker-end="url(#ah)"/>

  <!-- 注文ごとの分岐 -->
  <rect x="70" y="468" width="800" height="92" rx="8" fill="#ffffff" stroke="#5c6470" stroke-width="1.5"/>
  <text x="470" y="490" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#1a1d21">② 注文ごとの処理 — handle.get_order_stat(注文番号)</text>
  <text x="270" y="514" text-anchor="middle" font-size="11.5" fill="#2e7d32" font-weight="bold">items テーブルに存在 → キャッシュスキップ</text>
  <text x="270" y="532" text-anchor="middle" font-size="11" fill="#5c6470">今年のみ: 条件を満たし連続 5 件キャッシュヒットで</text>
  <text x="270" y="547" text-anchor="middle" font-size="11" fill="#5c6470">その年の巡回を早期終了（全ページを処理済み化）</text>
  <text x="670" y="514" text-anchor="middle" font-size="11.5" fill="#b06000" font-weight="bold">未取得 → order.fetch_item_list()</text>
  <text x="670" y="532" text-anchor="middle" font-size="11" fill="#5c6470">注文詳細ページへ遷移（タイムアウトはエラー記録）</text>
  <text x="670" y="547" text-anchor="middle" font-size="11" fill="#5c6470">-f 指定時はキャッシュを無視して全件取得</text>
  <path d="M670,560 L670,582" stroke="#5c6470" stroke-width="1.6" fill="none" marker-end="url(#ah)"/>

  <!-- parse_order -->
  <rect x="470" y="582" width="400" height="64" rx="8" fill="#ffffff" stroke="#5c6470" stroke-width="1.5"/>
  <text x="670" y="604" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#1a1d21">③ order.parse_order() — 注文種別の判定</text>
  <text x="670" y="622" text-anchor="middle" font-size="11.5" fill="#1a1d21">「デジタル注文」表記あり → _parse_order_digital()</text>
  <text x="670" y="638" text-anchor="middle" font-size="11.5" fill="#1a1d21">それ以外 → _parse_order_default()（purchasedItems を列挙）</text>
  <path d="M670,646 L670,668" stroke="#5c6470" stroke-width="1.6" fill="none" marker-end="url(#ah)"/>

  <!-- parse_item -->
  <rect x="470" y="668" width="400" height="108" rx="8" fill="#fdf3e7" stroke="#e47911" stroke-width="1.5"/>
  <text x="670" y="690" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#1a1d21">④ item.parse_item() — 商品 1 件のパース</text>
  <text x="670" y="710" text-anchor="middle" font-size="11.5" fill="#1a1d21">商品名・URL・ASIN（/dp/ または /gp/product/ から抽出）</text>
  <text x="670" y="728" text-anchor="middle" font-size="11.5" fill="#1a1d21">カテゴリ: 商品ページを別タブで開きパンくずリストを取得</text>
  <text x="670" y="746" text-anchor="middle" font-size="11.5" fill="#1a1d21">サムネイル: 別タブで画像を保存 + PIL で破損検証</text>
  <text x="670" y="764" text-anchor="middle" font-size="11.5" fill="#1a1d21">価格: a-offscreen 要素の textContent を parse_price</text>

  <!-- record -->
  <path d="M470,722 L360,722" stroke="#2e7d32" stroke-width="1.8" fill="none" marker-end="url(#ahg)"/>
  <rect x="110" y="694" width="250" height="56" rx="8" fill="#edf6ee" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="235" y="716" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#1a1d21">handle.record_item()</text>
  <text x="235" y="736" text-anchor="middle" font-size="11.5" fill="#5c6470">SQLite items テーブルに UPSERT</text>

  <text x="66" y="838" font-size="11" fill="#5c6470">※ 各ループは is_shutdown_requested() を確認し、Ctrl+C で安全に中断・次回実行時に途中から再開できる。-D（デバッグ）時は 1 件 / 1 ページ / 1 年で打ち切り。</text>
</svg>
