<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 620" font-family="'Hiragino Kaku Gothic ProN','Yu Gothic UI','Noto Sans CJK JP',sans-serif">
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L8,4.5 L0,9 z" fill="#5c6470"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="940" height="620" fill="#ffffff"/>

  <!-- main -->
  <rect x="320" y="16" width="300" height="52" rx="10" fill="#fdf3e7" stroke="#e47911" stroke-width="1.5"/>
  <text x="470" y="38" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#1a1d21">cli.main()</text>
  <text x="470" y="56" text-anchor="middle" font-size="11" fill="#5c6470">docopt で引数解析 → ロガー初期化 → 設定読み込み</text>

  <!-- 分岐線 -->
  <path d="M470,68 L470,86" stroke="#5c6470" stroke-width="1.6" fill="none"/>
  <path d="M160,86 L780,86" stroke="#5c6470" stroke-width="1.6" fill="none"/>
  <path d="M160,86 L160,110" stroke="#5c6470" stroke-width="1.6" fill="none" marker-end="url(#ah)"/>
  <path d="M470,86 L470,110" stroke="#5c6470" stroke-width="1.6" fill="none" marker-end="url(#ah)"/>
  <path d="M780,86 L780,110" stroke="#5c6470" stroke-width="1.6" fill="none" marker-end="url(#ah)"/>

  <!-- -E 列 -->
  <rect x="30" y="110" width="260" height="44" rx="8" fill="#ecf3fa" stroke="#1a5fa8" stroke-width="1.5"/>
  <text x="160" y="130" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1d21">-E : エラーログ表示</text>
  <text x="160" y="146" text-anchor="middle" font-size="11" fill="#5c6470">Selenium は起動しない</text>
  <path d="M160,154 L160,178" stroke="#5c6470" stroke-width="1.6" fill="none" marker-end="url(#ah)"/>
  <rect x="30" y="178" width="260" height="58" rx="8" fill="#ffffff" stroke="#1a5fa8"/>
  <text x="160" y="200" text-anchor="middle" font-size="12" fill="#1a1d21">-i ID あり → show_error_detail()</text>
  <text x="160" y="220" text-anchor="middle" font-size="12" fill="#1a1d21">なし → show_error_log()（-a で全件）</text>
  <path d="M160,236 L160,260" stroke="#5c6470" stroke-width="1.6" fill="none" marker-end="url(#ah)"/>
  <rect x="30" y="260" width="260" height="44" rx="8" fill="#ffffff" stroke="#1a5fa8"/>
  <text x="160" y="280" text-anchor="middle" font-size="12" fill="#1a1d21">rich.table で一覧 / 詳細を表示</text>
  <text x="160" y="296" text-anchor="middle" font-size="11" fill="#5c6470">未解決・解決済み件数のサマリー付き</text>

  <!-- -r 列 -->
  <rect x="340" y="110" width="260" height="44" rx="8" fill="#fdf4e5" stroke="#b06000" stroke-width="1.5"/>
  <text x="470" y="130" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1d21">-r : エラー項目の再取得</text>
  <text x="470" y="146" text-anchor="middle" font-size="11" fill="#5c6470">終了コード 0 / 1 を返す</text>
  <path d="M470,154 L470,178" stroke="#5c6470" stroke-width="1.6" fill="none" marker-end="url(#ah)"/>
  <rect x="340" y="178" width="260" height="58" rx="8" fill="#ffffff" stroke="#b06000"/>
  <text x="470" y="200" text-anchor="middle" font-size="12" fill="#1a1d21">-i ID あり → execute_retry_single()</text>
  <text x="470" y="220" text-anchor="middle" font-size="12" fill="#1a1d21">なし → execute_retry_mode()</text>
  <path d="M470,236 L470,260" stroke="#5c6470" stroke-width="1.6" fill="none" marker-end="url(#ah)"/>
  <rect x="340" y="260" width="260" height="58" rx="8" fill="#ffffff" stroke="#b06000"/>
  <text x="470" y="282" text-anchor="middle" font-size="12" fill="#1a1d21">with_session_retry の中で</text>
  <text x="470" y="300" text-anchor="middle" font-size="12" fill="#1a1d21">crawler.retry_failed_items / retry_error_by_id</text>

  <!-- 通常列 -->
  <rect x="650" y="110" width="260" height="44" rx="8" fill="#edf6ee" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="780" y="130" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1d21">通常 / -e : execute()</text>
  <text x="780" y="146" text-anchor="middle" font-size="11" fill="#5c6470">-D はキャッシュ無視を強制</text>
  <path d="M780,154 L780,178" stroke="#5c6470" stroke-width="1.6" fill="none" marker-end="url(#ah)"/>
  <rect x="650" y="178" width="260" height="44" rx="8" fill="#ffffff" stroke="#2e7d32"/>
  <text x="780" y="196" text-anchor="middle" font-size="12" fill="#1a1d21">Handle 生成</text>
  <text x="780" y="213" text-anchor="middle" font-size="11" fill="#5c6470">DB 初期化・ディレクトリ作成・進捗 UI</text>
  <path d="M780,222 L780,246" stroke="#5c6470" stroke-width="1.6" fill="none" marker-end="url(#ah)"/>
  <rect x="650" y="246" width="260" height="72" rx="8" fill="#ffffff" stroke="#2e7d32"/>
  <text x="780" y="266" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a1d21">収集（-e 指定時はスキップ）</text>
  <text x="780" y="284" text-anchor="middle" font-size="11.5" fill="#1a1d21">with_session_retry(execute_fetch)</text>
  <text x="780" y="301" text-anchor="middle" font-size="11.5" fill="#1a1d21">→ crawler.fetch_order_list()</text>
  <path d="M780,318 L780,342" stroke="#5c6470" stroke-width="1.6" fill="none" marker-end="url(#ah)"/>
  <rect x="650" y="342" width="260" height="44" rx="8" fill="#ffffff" stroke="#2e7d32"/>
  <text x="780" y="360" text-anchor="middle" font-size="12" fill="#1a1d21">history.generate_table_excel()</text>
  <text x="780" y="377" text-anchor="middle" font-size="11" fill="#5c6470">-N でサムネイルなし</text>
  <path d="M780,386 L780,410" stroke="#5c6470" stroke-width="1.6" fill="none" marker-end="url(#ah)"/>
  <rect x="650" y="410" width="260" height="58" rx="8" fill="#ffffff" stroke="#2e7d32"/>
  <text x="780" y="430" text-anchor="middle" font-size="12" fill="#1a1d21">handle.finish()</text>
  <text x="780" y="447" text-anchor="middle" font-size="11" fill="#5c6470">Selenium 終了・進捗停止・DB クローズ</text>
  <text x="780" y="461" text-anchor="middle" font-size="11" fill="#5c6470">→ input() で終了待ち（-D 時はスキップ）</text>

  <!-- with_session_retry の注記 -->
  <rect x="30" y="500" width="880" height="96" rx="10" fill="#f1f3f5" stroke="#5c6470" stroke-width="1"/>
  <text x="46" y="526" font-size="13" font-weight="bold" fill="#1a1d21">my_lib.selenium_util.with_session_retry によるセッション復旧（-r / 通常収集で共通）</text>
  <text x="46" y="550" font-size="12" fill="#1a1d21">・ブラウザクラッシュ等の InvalidSessionIdException 発生時、Selenium を終了して最大 1 回（_MAX_SESSION_RETRY_COUNT）再実行</text>
  <text x="46" y="570" font-size="12" fill="#1a1d21">・-R 指定時はリトライ前に Chrome プロファイルを削除（clear_profile_on_error）</text>
  <text x="46" y="590" font-size="12" fill="#1a1d21">・それでも失敗した場合は _handle_selenium_exception() がエラーを表示して終了コード 1 を返す</text>
</svg>
