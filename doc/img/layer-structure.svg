<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 720" font-family="'Hiragino Kaku Gothic ProN','Yu Gothic UI','Noto Sans CJK JP',sans-serif">
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L8,4.5 L0,9 z" fill="#5c6470"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="940" height="720" fill="#ffffff"/>

  <!-- エントリーポイント -->
  <rect x="20" y="16" width="900" height="72" rx="10" fill="#fdf3e7" stroke="#e47911" stroke-width="1.5"/>
  <text x="36" y="40" font-size="13" font-weight="bold" fill="#1a1d21">エントリーポイント</text>
  <rect x="200" y="28" width="420" height="48" rx="8" fill="#ffffff" stroke="#e47911"/>
  <text x="410" y="48" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1d21">cli.py</text>
  <text x="410" y="66" text-anchor="middle" font-size="11" fill="#5c6470">docopt による引数解析・モード分岐・実行ハーネス</text>
  <rect x="650" y="28" width="250" height="48" rx="8" fill="#ffffff" stroke="#e47911"/>
  <text x="775" y="48" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1d21">__main__.py</text>
  <text x="775" y="66" text-anchor="middle" font-size="11" fill="#5c6470">python -m amazhist → cli.main()</text>

  <!-- 状態管理 -->
  <rect x="20" y="112" width="900" height="86" rx="10" fill="#ecf3fa" stroke="#1a5fa8" stroke-width="1.5"/>
  <text x="36" y="136" font-size="13" font-weight="bold" fill="#1a1d21">設定・状態管理</text>
  <rect x="200" y="126" width="300" height="60" rx="8" fill="#ffffff" stroke="#1a5fa8"/>
  <text x="350" y="146" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1d21">config.py — Config</text>
  <text x="350" y="163" text-anchor="middle" font-size="11" fill="#5c6470">frozen dataclass 階層（login / data / output）</text>
  <text x="350" y="178" text-anchor="middle" font-size="11" fill="#5c6470">パス解決プロパティ（cache_file_path 等）</text>
  <rect x="530" y="126" width="370" height="60" rx="8" fill="#ffffff" stroke="#1a5fa8"/>
  <text x="715" y="146" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1d21">handle.py — Handle</text>
  <text x="715" y="163" text-anchor="middle" font-size="11" fill="#5c6470">Database / BrowserManager / ProgressManager を保持</text>
  <text x="715" y="178" text-anchor="middle" font-size="11" fill="#5c6470">全処理に引き回されるアプリケーション状態</text>

  <!-- 収集層 -->
  <rect x="20" y="222" width="580" height="272" rx="10" fill="#fbfbfc" stroke="#5c6470" stroke-width="1.5"/>
  <text x="36" y="246" font-size="13" font-weight="bold" fill="#1a1d21">収集層（Selenium 依存）</text>
  <rect x="40" y="260" width="540" height="46" rx="8" fill="#ffffff" stroke="#5c6470"/>
  <text x="310" y="279" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1d21">crawler.py</text>
  <text x="310" y="296" text-anchor="middle" font-size="11" fill="#5c6470">ログイン / CAPTCHA / 年巡回の制御 / エラーリトライ実行（retry_failed_items）</text>
  <rect x="40" y="316" width="540" height="46" rx="8" fill="#ffffff" stroke="#5c6470"/>
  <text x="310" y="335" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1d21">order_list.py</text>
  <text x="310" y="352" text-anchor="middle" font-size="11" fill="#5c6470">注文一覧ページの巡回（fetch_by_year / fetch_by_year_page）・早期終了判定</text>
  <rect x="40" y="372" width="260" height="46" rx="8" fill="#ffffff" stroke="#5c6470"/>
  <text x="170" y="391" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1d21">order.py</text>
  <text x="170" y="408" text-anchor="middle" font-size="11" fill="#5c6470">注文詳細（通常 / デジタル）・注文件数</text>
  <rect x="320" y="372" width="260" height="46" rx="8" fill="#ffffff" stroke="#5c6470"/>
  <text x="450" y="391" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1d21">item.py</text>
  <text x="450" y="408" text-anchor="middle" font-size="11" fill="#5c6470">商品パース・カテゴリ・サムネイル保存</text>
  <rect x="40" y="428" width="540" height="46" rx="8" fill="#edf6ee" stroke="#2e7d32"/>
  <text x="310" y="447" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1d21">parser.py（Selenium 非依存の純関数）</text>
  <text x="310" y="464" text-anchor="middle" font-size="11" fill="#5c6470">parse_date / parse_date_digital / parse_number / parse_price</text>

  <!-- 共有モジュール -->
  <rect x="620" y="222" width="300" height="272" rx="10" fill="#fbfbfc" stroke="#5c6470" stroke-width="1.5"/>
  <text x="636" y="246" font-size="13" font-weight="bold" fill="#1a1d21">共有モジュール</text>
  <rect x="636" y="260" width="268" height="62" rx="8" fill="#ffffff" stroke="#5c6470"/>
  <text x="770" y="280" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#1a1d21">const.py</text>
  <text x="770" y="297" text-anchor="middle" font-size="11" fill="#5c6470">URL テンプレート・リトライ回数</text>
  <text x="770" y="312" text-anchor="middle" font-size="11" fill="#5c6470">エラータイプ定数</text>
  <rect x="636" y="332" width="268" height="62" rx="8" fill="#ffffff" stroke="#5c6470"/>
  <text x="770" y="352" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#1a1d21">types.py</text>
  <text x="770" y="369" text-anchor="middle" font-size="11" fill="#5c6470">コールバック関数の Protocol 型 6 種</text>
  <text x="770" y="384" text-anchor="middle" font-size="11" fill="#5c6470">（循環 import 回避のための注入用）</text>
  <rect x="636" y="404" width="268" height="76" rx="8" fill="#ffffff" stroke="#5c6470"/>
  <text x="770" y="424" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#1a1d21">exceptions.py</text>
  <text x="770" y="441" text-anchor="middle" font-size="11" fill="#5c6470">AmazhistError を基底に</text>
  <text x="770" y="456" text-anchor="middle" font-size="11" fill="#5c6470">Login / Captcha / Thumbnail 系</text>
  <text x="770" y="471" text-anchor="middle" font-size="11" fill="#5c6470">の例外階層</text>

  <!-- 永続化・出力 -->
  <rect x="20" y="518" width="440" height="86" rx="10" fill="#edf6ee" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="36" y="542" font-size="13" font-weight="bold" fill="#1a1d21">永続化</text>
  <rect x="110" y="532" width="330" height="60" rx="8" fill="#ffffff" stroke="#2e7d32"/>
  <text x="275" y="552" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1d21">database.py — SQLite</text>
  <text x="275" y="569" text-anchor="middle" font-size="11" fill="#5c6470">items / metadata / year_status / page_status / error_log</text>
  <text x="275" y="584" text-anchor="middle" font-size="11" fill="#5c6470">キャッシュ・再開・エラー管理の中核</text>

  <rect x="480" y="518" width="440" height="86" rx="10" fill="#f2eefa" stroke="#6a4ba3" stroke-width="1.5"/>
  <text x="496" y="542" font-size="13" font-weight="bold" fill="#1a1d21">出力</text>
  <rect x="560" y="532" width="340" height="60" rx="8" fill="#ffffff" stroke="#6a4ba3"/>
  <text x="730" y="552" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1d21">history.py — Excel 生成</text>
  <text x="730" y="569" text-anchor="middle" font-size="11" fill="#5c6470">openpyxl + my_lib.openpyxl_util.generate_list_sheet</text>
  <text x="730" y="584" text-anchor="middle" font-size="11" fill="#5c6470">サムネイル埋め込み・列定義（_SHEET_DEF）</text>

  <!-- 外部ライブラリ -->
  <rect x="20" y="628" width="900" height="72" rx="10" fill="#f1f3f5" stroke="#5c6470" stroke-width="1"/>
  <text x="36" y="652" font-size="13" font-weight="bold" fill="#1a1d21">外部ライブラリ</text>
  <text x="36" y="674" font-size="11.5" fill="#5c6470">my_lib（browser_manager / selenium_util / cui_progress / graceful_shutdown / sqlite_util / openpyxl_util / config / logger）</text>
  <text x="36" y="691" font-size="11.5" fill="#5c6470">selenium + undetected-chromedriver ・ openpyxl ・ Pillow ・ rich ・ docopt-ng</text>

  <!-- 矢印 -->
  <path d="M410,76 L410,112" stroke="#5c6470" stroke-width="1.6" fill="none" marker-end="url(#ah)"/>
  <path d="M310,198 L310,222" stroke="#5c6470" stroke-width="1.6" fill="none" marker-end="url(#ah)"/>
  <path d="M275,494 L275,518" stroke="#5c6470" stroke-width="1.6" fill="none" marker-end="url(#ah)"/>
  <path d="M715,198 C760,205 800,205 830,222" stroke="#5c6470" stroke-width="1.6" fill="none" marker-end="url(#ah)"/>
  <path d="M600,600 C620,610 640,615 660,618" stroke="#5c6470" stroke-width="0" fill="none"/>
  <path d="M460,562 L560,562" stroke="#5c6470" stroke-width="1.6" fill="none" marker-end="url(#ah)"/>
  <text x="510" y="554" text-anchor="middle" font-size="10.5" fill="#5c6470">item_list</text>
</svg>
