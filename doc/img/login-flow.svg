<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 640" font-family="'Hiragino Kaku Gothic ProN','Yu Gothic UI','Noto Sans CJK JP',sans-serif">
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L8,4.5 L0,9 z" fill="#5c6470"/>
    </marker>
    <marker id="ahg" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L8,4.5 L0,9 z" fill="#2e7d32"/>
    </marker>
    <marker id="ahr" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L8,4.5 L0,9 z" fill="#c9302c"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="940" height="640" fill="#ffffff"/>

  <!-- keep_logged_on -->
  <rect x="40" y="20" width="380" height="50" rx="10" fill="#fdf3e7" stroke="#e47911" stroke-width="1.5"/>
  <text x="230" y="41" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#1a1d21">_keep_logged_on()</text>
  <text x="230" y="59" text-anchor="middle" font-size="11" fill="#5c6470">ページ遷移のたびに呼ばれるログイン維持チェック</text>

  <path d="M230,70 L230,96" stroke="#5c6470" stroke-width="1.6" fill="none" marker-end="url(#ah)"/>
  <rect x="40" y="96" width="380" height="50" rx="8" fill="#ffffff" stroke="#5c6470" stroke-width="1.5"/>
  <text x="230" y="117" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#1a1d21">ページタイトルが「Amazonサインイン」で始まる？</text>
  <text x="230" y="135" text-anchor="middle" font-size="11" fill="#5c6470">re.match("Amazonサインイン", driver.title)</text>

  <path d="M420,121 L520,121" stroke="#2e7d32" stroke-width="1.8" fill="none" marker-end="url(#ahg)"/>
  <text x="470" y="112" text-anchor="middle" font-size="11" fill="#2e7d32" font-weight="bold">No</text>
  <rect x="520" y="96" width="200" height="50" rx="8" fill="#edf6ee" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="620" y="117" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#1a1d21">ログイン済み</text>
  <text x="620" y="135" text-anchor="middle" font-size="11" fill="#5c6470">何もせず処理続行</text>

  <path d="M230,146 L230,176" stroke="#5c6470" stroke-width="1.6" fill="none" marker-end="url(#ah)"/>
  <text x="245" y="166" font-size="11" fill="#c9302c" font-weight="bold">Yes</text>

  <!-- execute_login -->
  <rect x="40" y="176" width="380" height="168" rx="10" fill="#fbfbfc" stroke="#5c6470" stroke-width="1.5"/>
  <text x="230" y="200" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1d21">_execute_login()</text>
  <text x="60" y="226" font-size="11.5" fill="#1a1d21">1. #ap_email が表示されていれば config のユーザー名を入力</text>
  <text x="60" y="248" font-size="11.5" fill="#1a1d21">2. #continue ボタンがあればクリック</text>
  <text x="60" y="270" font-size="11.5" fill="#1a1d21">3. #ap_password にパスワードを入力</text>
  <text x="60" y="292" font-size="11.5" fill="#1a1d21">4. rememberMe が未チェックならチェック</text>
  <text x="60" y="314" font-size="11.5" fill="#1a1d21">5. #signInSubmit をクリック → 2 秒待機</text>

  <path d="M230,344 L230,374" stroke="#5c6470" stroke-width="1.6" fill="none" marker-end="url(#ah)"/>
  <rect x="40" y="374" width="380" height="50" rx="8" fill="#ffffff" stroke="#5c6470" stroke-width="1.5"/>
  <text x="230" y="395" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#1a1d21">画像認証の入力欄（cvf_captcha_input）が出現？</text>
  <text x="230" y="413" text-anchor="middle" font-size="11" fill="#5c6470">なければログイン結果の確認へ</text>

  <!-- captcha -->
  <path d="M420,399 L520,399" stroke="#c9302c" stroke-width="1.8" fill="none" marker-end="url(#ahr)"/>
  <text x="470" y="390" text-anchor="middle" font-size="11" fill="#c9302c" font-weight="bold">Yes</text>
  <rect x="520" y="356" width="390" height="168" rx="10" fill="#fbeeee" stroke="#c9302c" stroke-width="1.5"/>
  <text x="715" y="380" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1d21">_resolve_captcha()</text>
  <text x="540" y="406" font-size="11.5" fill="#1a1d21">1. CAPTCHA 画像を config の captcha パス（例:</text>
  <text x="540" y="424" font-size="11.5" fill="#1a1d21">　 output/captcha.png）にスクリーンショット保存</text>
  <text x="540" y="446" font-size="11.5" fill="#1a1d21">2. ターミナルの input() でユーザーにテキスト入力を促す</text>
  <text x="540" y="468" font-size="11.5" fill="#1a1d21">3. 入力値を送信。まだ入力欄が残っていれば失敗と判定し</text>
  <text x="540" y="486" font-size="11.5" fill="#1a1d21">　 ページをダンプして再試行（最大 RETRY_CAPTCHA = 2 回）</text>
  <text x="540" y="508" font-size="11.5" fill="#c9302c">全て失敗 → CaptchaError 送出</text>

  <path d="M230,424 L230,454" stroke="#5c6470" stroke-width="1.6" fill="none" marker-end="url(#ah)"/>
  <text x="245" y="444" font-size="11" fill="#5c6470">No / CAPTCHA 解決後</text>

  <!-- 結果確認 -->
  <rect x="40" y="454" width="380" height="64" rx="8" fill="#ffffff" stroke="#5c6470" stroke-width="1.5"/>
  <text x="230" y="476" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#1a1d21">ログイン結果の確認</text>
  <text x="230" y="494" text-anchor="middle" font-size="11.5" fill="#1a1d21">タイトルがまだ「Amazonサインイン」→ ページをダンプし</text>
  <text x="230" y="510" text-anchor="middle" font-size="11.5" fill="#1a1d21">LoginError として最大 RETRY_LOGIN = 2 回再試行</text>

  <path d="M140,518 L140,552" stroke="#2e7d32" stroke-width="1.8" fill="none" marker-end="url(#ahg)"/>
  <rect x="40" y="552" width="200" height="46" rx="8" fill="#edf6ee" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="140" y="572" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#2e7d32">ログイン成功</text>
  <text x="140" y="590" text-anchor="middle" font-size="11" fill="#5c6470">巡回処理を続行</text>

  <path d="M330,518 L330,552" stroke="#c9302c" stroke-width="1.8" fill="none" marker-end="url(#ahr)"/>
  <rect x="260" y="552" width="240" height="46" rx="8" fill="#fbeeee" stroke="#c9302c" stroke-width="1.5"/>
  <text x="380" y="572" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#c9302c">LoginError 送出</text>
  <text x="380" y="590" text-anchor="middle" font-size="11" fill="#5c6470">「ログインに失敗しました．」</text>

  <text x="540" y="572" font-size="11" fill="#5c6470">※ ログイン情報は config.yaml の login.amazon から取得。</text>
  <text x="540" y="590" font-size="11" fill="#5c6470">※ Chrome プロファイルは data/chrome に永続化され、</text>
  <text x="540" y="608" font-size="11" fill="#5c6470">　 次回以降の再ログインを軽減。</text>
</svg>
